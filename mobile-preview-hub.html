<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTMS Mobile Preview Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #2563EB;
      --blue-d: #1D4ED8;
      --blue-l: #EFF6FF;
      --green: #10B981;
      --green-d: #059669;
      --green-l: #ECFDF5;
      --red: #EF4444;
      --red-d: #DC2626;
      --red-l: #FEF2F2;
      --amber: #F59E0B;
      --amber-d: #B45309;
      --amber-l: #FFFBEB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-300: #D1D5DB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #fff;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(to right, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: #94a3b8;
      font-size: 14px;
    }

    .app-switcher {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      background: rgba(255, 255, 255, 0.05);
      padding: 8px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .app-btn {
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      background: transparent;
      color: #94a3b8;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    .app-btn.active {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
    }

    /* Phone Frame */
    .phone-outer {
      width: 375px;
      height: 812px;
      background: #0a0a0f;
      border-radius: 52px;
      padding: 12px;
      position: relative;
      box-shadow: 0 0 0 4px #1e293b, 0 30px 60px rgba(0, 0, 0, 0.6);
      transition: transform 0.3s ease;
    }

    .phone-notch {
      width: 150px;
      height: 30px;
      background: #0a0a0f;
      border-radius: 0 0 20px 20px;
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .notch-speaker {
      width: 40px;
      height: 4px;
      background: #1a1a2a;
      border-radius: 2px;
    }

    .notch-cam {
      width: 8px;
      height: 8px;
      background: #1a1a2a;
      border-radius: 50%;
      border: 1px solid #222;
    }

    .phone-screen {
      background: var(--gray-100);
      border-radius: 40px;
      overflow: hidden;
      height: 100%;
      width: 100%;
      position: relative;
      color: var(--gray-900);
      display: flex;
      flex-direction: column;
    }

    /* Iframe for Apps */
    #app-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    .device-info {
      margin-top: 30px;
      font-size: 12px;
      color: #64748b;
      max-width: 400px;
      text-align: center;
      line-height: 1.6;
    }

    /* Hide hub controls when printing or focusing */
    @media (max-width: 500px) {
      .app-switcher {
        flex-direction: column;
        width: 100%;
      }

      .phone-outer {
        transform: scale(0.9);
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>CTMS Mobile Preview Hub</h1>
    <p>Experience the Officer and Student/Parent applications in one place</p>
  </div>

  <div class="app-switcher">
    <button class="app-btn active" onclick="loadApp('staff', this)">
      <span>👨‍✈️</span> Transport Staff App
      <small>Driver, Coordinator, Maintenance</small>
    </button>
    <button class="app-btn" onclick="loadApp('user', this)">
      <span>🎓</span> Academic & Student App
      <small>Students, Parents, HoD</small>
    </button>
  </div>

  <div class="phone-outer">
    <div class="phone-notch">
      <div class="notch-speaker"></div>
      <div class="notch-cam"></div>
    </div>
    <div class="phone-screen">
      <iframe id="app-frame" src="mobile-officer/preview.html?v=14&auto=driver"></iframe>
    </div>
  </div>

  <div class="device-info" style="display:flex; justify-content:space-between; align-items:center;">
    <div><strong>Interactive Preview:</strong> Role-based simulation is active. Select an app to see relevant roles.
    </div>
    <button onclick="openWebAdmin()"
      style="background:var(--blue); color:white; border:none; padding:8px 16px; border-radius:6px; font-weight:800; cursor:pointer; font-size:11px;">💻
      OPEN WEB ADMIN</button>
  </div>

  <script>
    function loadApp(type, btn) {
      document.querySelectorAll('.app-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const frame = document.getElementById('app-frame');
      if (type === 'staff') {
        frame.src = 'mobile-officer/preview.html?v=14';
      } else {
        frame.src = 'mobile-student-parent/preview.html?v=14';
      }
    }

    function openWebAdmin() {
      window.open('http://localhost:5174/', '_blank');
    }
  </script>
</body>

</html>
